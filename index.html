<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>i·c morel</title>
<link rel="canonical" href="https://icmorel.com/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Mono:wght@0,300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#0e0d0b;
  --paper:#f5f0e8;
  --dim:#7a7268;
  --accent:#8b3a2a;
  --faint:#2a2620;
}
body{background:var(--ink);font-family:'Cormorant Garamond',serif;min-height:100vh;display:flex;justify-content:center;padding:3rem 1.5rem}

.page{width:100%;max-width:420px;display:flex;flex-direction:column;gap:0}

.name{font-weight:300;font-style:italic;font-size:clamp(3.2rem,12vw,4.8rem);line-height:0.88;letter-spacing:-0.02em;color:var(--paper);margin-bottom:0.8rem}
.surname{font-style:normal;color:var(--accent);display:block}

.descriptor{font-family:'DM Mono',monospace;font-size:0.7rem;font-weight:300;letter-spacing:0.18em;color:var(--dim);text-transform:lowercase;margin-bottom:1.2rem}

.nav-row{display:flex;align-items:center;gap:1.2rem;flex-wrap:wrap;padding-bottom:1.6rem;border-bottom:0.5px solid var(--faint)}
.ndiv{width:0.5px;height:12px;background:var(--faint);flex-shrink:0}

.nav-icon{display:flex;align-items:center;justify-content:center;position:relative;text-decoration:none}
.nav-icon img{width:20px;height:20px;display:block;opacity:0.45;transition:opacity 0.2s}
.nav-icon:hover img{opacity:1}
.nav-icon-label{position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.12em;color:var(--dim);white-space:nowrap;opacity:0;transition:opacity 0.2s;pointer-events:none}
.nav-icon:hover .nav-icon-label{opacity:1}
.icon-group{display:flex;align-items:center;gap:1.2rem}

.writing-block{margin-top:2.5rem}
.item-label{font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:0.2em;text-transform:lowercase;color:var(--accent);margin-bottom:0.9rem}

.writing-entry{border-top:0.5px solid var(--faint)}
.writing-entry:last-of-type{border-bottom:0.5px solid var(--faint)}
.writing-entry.hidden{display:none}

.entry-header{display:flex;align-items:baseline;justify-content:space-between;gap:1rem;padding:0.85rem 0;cursor:pointer}
.entry-header:hover .wl-title{color:var(--paper)}
.wl-title{font-family:'Cormorant Garamond',serif;font-weight:300;font-style:italic;font-size:1.15rem;color:#a09688;transition:color 0.2s;flex:1}
.wl-right{display:flex;align-items:baseline;gap:0.8rem;flex-shrink:0}
.wl-meta{font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.1em;color:var(--faint);white-space:nowrap}
.wl-toggle{font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--faint);transition:color 0.2s;line-height:1}
.entry-header:hover .wl-toggle{color:var(--dim)}
.writing-entry.open .wl-toggle{color:var(--accent)}

.entry-body{overflow:hidden;max-height:0;transition:max-height 0.4s ease, opacity 0.3s ease;opacity:0}
.writing-entry.open .entry-body{max-height:2000px;opacity:1}

.entry-text{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:1.05rem;line-height:1.9;color:#a09688;padding:0.2rem 0 1.4rem;white-space:pre-wrap}

.show-more-row{margin-top:1.2rem;display:flex;justify-content:center}
.show-more{background:transparent;border:none;cursor:pointer;font-family:'DM Mono',monospace;font-size:0.65rem;font-weight:300;letter-spacing:0.2em;text-transform:lowercase;color:var(--dim);border-bottom:0.5px solid var(--faint);padding-bottom:2px;transition:color 0.2s,border-color 0.2s}
.show-more:hover{color:var(--paper);border-color:#5a5040}
.show-more-row.hidden{display:none}

footer{margin-top:3rem;padding-top:1.2rem;border-top:0.5px solid var(--faint);display:flex;justify-content:flex-end}
.footer-copy{font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.1em;color:#2e2b26;text-transform:lowercase}
</style>
</head>
<body>
<div class="page">

  <div class="name">
    <span>i·c</span>
    <span class="surname">morel</span>
  </div>

  <p class="descriptor">fiction &amp; poetry writer</p>

  <div class="nav-row">
    <div class="icon-group">
      <a href="index.html" class="nav-icon">
        <img src="icons/icon-home.svg" alt="home">
        <span class="nav-icon-label">home</span>
      </a>
      <a href="about.html" class="nav-icon">
        <img src="icons/icon-about.svg" alt="about">
        <span class="nav-icon-label">about</span>
      </a>
      <a href="books.html" class="nav-icon">
        <img src="icons/icon-books.svg" alt="books">
        <span class="nav-icon-label">books</span>
      </a>
      <a href="contact.html" class="nav-icon">
        <img src="icons/icon-contact.svg" alt="contact">
        <span class="nav-icon-label">contact</span>
      </a>
    </div>
    <div class="ndiv"></div>
    <div class="icon-group">
      <a href="https://www.instagram.com/i.c.morel/" class="nav-icon" target="_blank" rel="noopener">
        <img src="icons/icon-instagram.svg" alt="instagram">
        <span class="nav-icon-label">instagram</span>
      </a>
      <a href="https://www.goodreads.com/user/show/188700803-i-c-morel" class="nav-icon" target="_blank" rel="noopener">
        <img src="icons/icon-goodreads.svg" alt="goodreads">
        <span class="nav-icon-label">goodreads</span>
      </a>
    </div>
  </div>

  <div class="writing-block">
    <p class="item-label">works</p>
    <div id="works-list"></div>
    <div class="show-more-row hidden">
      <button class="show-more">show more</button>
    </div>
  </div>

  <footer>
    <p class="footer-copy">© i·c morel</p>
  </footer>

</div>
<script>
const VISIBLE = 5;
const list = document.getElementById('works-list');
const showMoreRow = document.querySelector('.show-more-row');
const showMoreBtn = document.querySelector('.show-more');

function getEntries(){ return Array.from(list.querySelectorAll('.writing-entry')); }

function openEntry(entry){
  getEntries().forEach(e => {
    e.classList.remove('open');
    e.querySelector('.wl-toggle').textContent = '+';
  });
  entry.classList.remove('hidden');
  entry.classList.add('open');
  entry.querySelector('.wl-toggle').textContent = '−';
}

function buildEntries(works){
  list.innerHTML = '';
  works.forEach(work => {
    const div = document.createElement('div');
    div.className = 'writing-entry';
    div.id = work.id;
    div.innerHTML = `
      <div class="entry-header">
        <span class="wl-title">${work.title}</span>
        <span class="wl-right">
          <span class="wl-meta">${work.date}</span>
          <span class="wl-toggle">+</span>
        </span>
      </div>
      <div class="entry-body">
        <div class="entry-text">${work.text}</div>
      </div>`;
    list.appendChild(div);
  });

  // apply last-of-type border via JS since dynamic
  const entries = getEntries();
  if(entries.length > 0){
    entries[entries.length - 1].style.borderBottom = '0.5px solid var(--faint)';
  }

  // hide past VISIBLE
  if(entries.length > VISIBLE){
    entries.slice(VISIBLE).forEach(e => e.classList.add('hidden'));
    showMoreRow.classList.remove('hidden');
  }

  // accordion + hash
  entries.forEach(entry => {
    entry.querySelector('.entry-header').addEventListener('click', function(){
      const isOpen = entry.classList.contains('open');
      getEntries().forEach(e => {
        e.classList.remove('open');
        e.querySelector('.wl-toggle').textContent = '+';
      });
      if(!isOpen){
        entry.classList.add('open');
        entry.querySelector('.wl-toggle').textContent = '−';
        if(entry.id) history.replaceState(null, '', '#' + entry.id);
      } else {
        history.replaceState(null, '', window.location.pathname);
      }
    });
  });

  // open from hash on load
  if(window.location.hash){
    const target = list.querySelector(window.location.hash);
    if(target){
      openEntry(target);
      setTimeout(() => target.scrollIntoView({behavior:'smooth', block:'start'}), 100);
    }
  }
}

showMoreBtn.addEventListener('click', function(){
  getEntries().forEach(e => e.classList.remove('hidden'));
  showMoreRow.classList.add('hidden');
});

fetch('content/works.json')
  .then(r => r.json())
  .then(buildEntries)
  .catch(() => { list.innerHTML = '<p style="color:var(--dim);font-size:0.9rem;padding:1rem 0">works unavailable.</p>'; });
</script>
</body>
</html>
